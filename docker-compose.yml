version: '3.9'

services:
  postgres:
    image: postgres:17
    container_name: financehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - financehub-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: financehub-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  rabbitmq:
    image: rabbitmq:4-management
    container_name: financehub-rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  financehub-postgres-data:
